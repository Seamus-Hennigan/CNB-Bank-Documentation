site_name: 'CNB-Bank Documentation'
site_description: 'Homelab, cloud infrastructure, and a distributed caching system powering a banking/trading service.'
site_author: 'Your Name'
site_url: https://docs.cnb-bank.org
repo_url: https://github.com/Seamus-Hennigan/CNB-Bank

theme:
  name: custommill
  # custommill-specific options:
  main_color: "#bb0000"        # primary accent color
  gray: "#d0d0d0"
  lighter_gray: "#eeeeee"
  date_time_format: "%Y-%m-%d %H:%M:%S %Z"
  toc_depth: 2

markdown_extensions:
  - admonition
  - toc:
      permalink: '#'
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

extra_javascript:
  - js/mermaid-init.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra:
  history_buttons: false
  nav_links:
    - text: Portfolio
      url: https://seamushennigan.com

nav:
  - Home: home.md
  - About the Project: about.md

  # ── CLOUD ──────────────────────────────
  - Cloud:
      - Overview: cloud/index.md
      - AWS:
          - Overview: cloud/aws/overview.md
          - Architecture: cloud/aws/architecture.md
          - Runbooks: cloud/aws/runbooks.md
      - Cloudflare:
          - Overview: cloud/cloudflare/overview.md
          - Architecture: cloud/cloudflare/architecture.md
          - Website Hosting: cloud/cloudflare/website-hosting.md
          - Tunnels: cloud/cloudflare/tunnels.md
          - Runbooks: cloud/cloudflare/runbooks.md

  # ── HOMELAB SETUP ──────────────────────
  - Homelab Setup:
      - Overview: self-hosted/homelab-setup.md
      - Gear & Photos: self-hosted/homelab-gear.md
      - Raspberry Pis:
          - Overview: self-hosted/raspberry-pis/overview.md
          - Diagram's: self-hosted/raspberry-pis/diagram.md
      - Database:
          - Overview: self-hosted/database/overview.md
          - Schema & Config: self-hosted/database/schema.md
      - Kubernetes:
          - Overview: self-hosted/kubernetes/overview.md
          - Architecture: self-hosted/kubernetes/architecture.md
          - Runbooks: self-hosted/kubernetes/runbooks.md
      - Networking:
          - Overview: self-hosted/networking/overview.md

  # ── DISTRIBUTED CACHING SYSTEM ─────────
  - Distributed Caching System:
      - Overview: caching/index.md
      - Architecture: caching/architecture.md
      - Website Caching Workers:
          - Overview: caching/website-workers/overview.md
          - Architecture: caching/website-workers/architecture.md
          - Runbooks: caching/website-workers/runbooks.md
      - Edge Database Systems:
          - Overview: caching/edge-database/overview.md
          - Architecture: caching/edge-database/architecture.md
          - Runbooks: caching/edge-database/runbooks.md
      - Cache Invalidation & Consistency:
          - Overview: caching/invalidation/overview.md
          - Architecture: caching/invalidation/architecture.md
          - Runbooks: caching/invalidation/runbooks.md
      - Trading Service Integration:
          - Overview: caching/trading-integration/overview.md
          - Architecture: caching/trading-integration/architecture.md
          - Runbooks: caching/trading-integration/runbooks.md
